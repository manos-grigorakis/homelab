apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
spec:
  destination:
    namespace: snapshot-controller
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/manos-grigorakis/homelab.git
      targetRevision: main
      path: k3s/infra/snapshot-controller
  project: default
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
